<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精選影片庫</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        
        body { background-color: var(--bg); color: var(--text-main); padding: 24px; min-height: 100vh; }
        
        .container { max-width: 1200px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
        header h1 { font-size: 24px; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px; }

        .hidden { display: none !important; }

        /* 按鈕設計 */
        .btn { padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--card-bg); color: var(--text-main); font-weight: 500; cursor: pointer; transition: all 0.2s ease; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; }
        .btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { background: #fee2e2; color: var(--danger); border: none; }
        .btn-danger:hover { background: #fca5a5; color: var(--danger-hover); }

        /* 管理員後台面板 */
        #adminArea { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); border: 1px solid var(--border); padding: 24px; border-radius: var(--radius); margin-bottom: 32px; box-shadow: var(--shadow-lg); }
        #adminArea h3 { margin-bottom: 16px; font-size: 18px; }
        .admin-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
        .admin-input-group { display: flex; gap: 10px; margin-bottom: 16px; }
        input[type="text"], textarea { width: 100%; padding: 10px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--card-bg); font-size: 14px; outline: none; transition: border 0.2s; }
        input[type="text"]:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        /* 分頁標籤樣式 */
        #tabsContainer { display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        #tabsContainer::-webkit-scrollbar { height: 4px; }
        #tabsContainer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .tab-btn { padding: 10px 20px; border-radius: 20px; border: 1px solid transparent; background: transparent; color: var(--text-muted); font-weight: 600; cursor: pointer; transition: all 0.2s ease; white-space: nowrap; font-size: 15px; }
        .tab-btn:hover { color: var(--text-main); background: #edf2f7; }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.25); }

        /* 影片卡片網格 */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        
        .video-card { background: var(--card-bg); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); transition: transform 0.2s ease, box-shadow 0.2s ease; position: relative; display: flex; flex-direction: column; }
        .video-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        
        /* YouTube 封面預覽圖 */
        .thumb-wrapper { width: 100%; aspect-ratio: 16 / 9; background: #e2e8f0; position: relative; overflow: hidden; }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .video-card:hover .thumb-img { transform: scale(1.05); }
        
        /* 播放按鈕覆蓋效果 */
        .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
        .video-card:hover .play-overlay { opacity: 1; }
        .play-icon { width: 48px; height: 48px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); color: var(--primary); font-size: 18px; }

        .video-info { padding: 16px; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; gap: 12px; }
        .video-title { font-size: 15px; font-weight: 600; color: var(--text-main); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 42px; }
        
        .card-actions { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .btn-play-link { text-decoration: none; color: var(--primary); font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; gap: 4px; }
        .btn-play-link:hover { color: var(--primary-hover); }

        /* 拖拽排序狀態 */
        .video-card.draggable { cursor: grab; }
        .video-card.draggable:active { cursor: grabbing; }
        .video-card.drag-over { border: 2px dashed var(--primary); transform: scale(0.98); }
        .drag-badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.6); color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px; z-index: 10; display: flex; align-items: center; gap: 4px; backdrop-filter: blur(4px); pointer-events: none; }

        /* 狀態文字提示 */
        .status-msg { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 15px; grid-column: 1 / -1; }

        @media (max-width: 640px) {
            body { padding: 16px; }
            header h1 { font-size: 20px; }
            .video-grid { grid-template-columns: 1fr; gap: 16px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>精選影片庫</h1>
            <div>
                <button id="adminLoginBtn" onclick="checkPassword()" class="btn">🔑 管理員登入</button>
            </div>
        </header>

        <!-- 管理員控制區 -->
        <div id="adminArea" class="hidden">
            <h3>🛠️ 管理員控制台</h3>
            <div class="admin-actions">
                <button onclick="lockAdmin()" class="btn">🚪 登出系統</button>
                <button onclick="flipOrder()" class="btn">↕️ 顛倒目前順序</button>
                <button onclick="removeCurrentTab()" class="btn btn-danger">🗑️ 刪除目前分頁</button>
            </div>
            
            <div class="admin-input-group">
                <input type="text" id="newTabName" placeholder="輸入全新分頁名稱...">
                <button onclick="addTab()" class="btn btn-primary" style="white-space:nowrap;">📁 新增分頁</button>
            </div>
            
            <div style="margin-bottom: 12px;">
                <textarea id="rawInput" rows="3" placeholder="批量匯入格式：&#10;影片標題1  https://youtu.be/xxx&#10;影片標題2  https://youtu.be/yyy"></textarea>
            </div>
            <button onclick="importVideos()" class="btn btn-primary" style="width: 100%; justify-content: center;">⚡ 智能解析並匯入影片</button>
        </div>

        <!-- 分頁導覽欄 -->
        <div id="tabsContainer">
            <div style="color: var(--text-muted); font-size:14px;">正在建立安全連線...</div>
        </div>

        <!-- 影片卡片容器 -->
        <div class="video-grid" id="videoWrapper">
            <div class="status-msg">正在同步 Firebase 資料庫...</div>
        </div>
    </div>

    <script>
        // Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyBl7yqNoQQBZOt2v6aN_wre1if7cXGFOns",
            authDomain: "fir-836a9.firebaseapp.com",
            databaseURL: "https://fir-836a9-default-rtdb.firebaseio.com/",
            projectId: "fir-836a9",
            storageBucket: "fir-836a9.firebasestorage.app",
            messagingSenderId: "229605718156",
            appId: "1:229605718156:web:533d91c7a0907212a7a3a9"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database(); 
        const dbRef = database.ref('video_data');

        // 預設數據
        const defaultData = {
            "TankShow": [
                { title: "TankShow 10 360 現場精采片段", url: "https://youtu.be/A5ruMMW0_vY" },
                { title: "TankShow 10 完整紀錄檔", url: "https://youtu.be/haUWQOHag5s" }
            ],
            "動物精選": [
                { title: "可愛大熊貓的搞笑日常派對", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" }
            ]
        };

        window.db = {}; 
        window.currentTab = "";
        window.isAdminMode = false;
        let dragSrcIndex = null;

        function getYoutubeThumb(url) {
            if (!url) return 'https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=500&q=80';
            let videoId = null;
            try {
                if (url.includes('youtu.be/')) {
                    videoId = url.split('youtu.be/')[1].split(/[?#]/)[0];
                } else if (url.includes('v=')) {
                    videoId = url.split('v=')[1].split('&')[0].split(/[?#]/)[0];
                } else if (url.includes('embed/')) {
                    videoId = url.split('embed/')[1].split(/[?#]/)[0];
                }
            } catch(e) { console.error(e); }
            return videoId ? `https://img.youtube.com/vi/${videoId}/mqdefault.jpg` : 'https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=500&q=80';
        }

        // Firebase 監聽
        dbRef.on('value', (snapshot) => {
            try {
                const data = snapshot.val();
                if (data && Object.keys(data).length > 0) {
                    window.db = data;
                } else {
                    window.db = defaultData;
                    window.saveToStorage();
                }
                
                const tabs = Object.keys(window.db);
                if (!window.currentTab || !window.db[window.currentTab]) {
                    window.currentTab = tabs.length > 0 ? tabs[0] : "";
                }
                
                window.renderTabs();
                window.renderCards();
            } catch (error) { console.error(error); }
        });

        window.saveToStorage = function() {
            dbRef.set(window.db)
                .then(() => console.log("雲端同步成功"))
                .catch((err) => console.error("同步失敗", err));
        }

        window.renderTabs = function() {
            const container = document.getElementById('tabsContainer');
            if (!container) return;
            container.innerHTML = '';
            
            const tabs = Object.keys(window.db || {});
            if(tabs.length === 0) {
                container.innerHTML = '<div style="color:var(--text-muted); font-size:14px; padding:10px 0;">💡 目前沒有分頁，請在上方輸入名稱並點擊「新增分頁」</div>';
                return;
            }

            tabs.forEach(tabName => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${tabName === window.currentTab ? 'active' : ''}`;
                btn.innerText = tabName;
                btn.onclick = function() {
                    window.currentTab = tabName;
                    window.renderTabs();
                    window.renderCards();
                };
                container.appendChild(btn);
            });
        }

        window.renderCards = function() {
            const wrapper = document.getElementById('videoWrapper');
            if (!wrapper) return;
            wrapper.innerHTML = '';

            if (!window.db || !window.currentTab || !window.db[window.currentTab] || window.db[window.currentTab].length === 0) {
                wrapper.innerHTML = `<div class="status-msg">📭 此分頁目前空空如也，請在下方貼上網址匯入影片！</div>`;
                return;
            }

            window.db[window.currentTab].forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                
                if (window.isAdminMode) {
                    card.draggable = true;
                    card.classList.add('draggable');
                    card.innerHTML = `<div class="drag-badge">☰ 拖曳排序</div>`;
                    
                    card.addEventListener('dragstart', (e) => dragSrcIndex = index);
                    card.addEventListener('dragover', (e) => e.preventDefault());
                    card.addEventListener('dragenter', () => card.classList.add('drag-over'));
                    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
                    card.addEventListener('drop', (e) => {
                        e.stopPropagation();
                        if (dragSrcIndex !== null && dragSrcIndex !== index) {
                            const list = window.db[window.currentTab];
                            const targetItem = list.splice(dragSrcIndex, 1)[0];
                            list.splice(index, 0, targetItem);
                            window.saveToStorage();
                        }
                        dragSrcIndex = null;
                    });
                    card.addEventListener('dragend', () => {
                        document.querySelectorAll('.video-card').forEach(c => c.classList.remove('drag-over'));
                    });
                }

                const thumbWrapper = document.createElement('div');
                thumbWrapper.className = 'thumb-wrapper';
                const img = document.createElement('img');
                img.className = 'thumb-img';
                img.src = getYoutubeThumb(item.url);
                img.loading = 'lazy';
                
                const overlay = document.createElement('div');
                overlay.className = 'play-overlay';
                overlay.innerHTML = `<div class="play-icon">▶</div>`;
                
                thumbWrapper.appendChild(img);
                thumbWrapper.appendChild(overlay);
                card.appendChild(thumbWrapper);

                const info = document.createElement('div');
                info.className = 'video-info';
                const title = document.createElement('div');
                title.className = 'video-title';
                title.innerText = item.title || '未命名影片';
                info.appendChild(title);

                const actions = document.createElement('div');
                actions.className = 'card-actions';
                const link = document.createElement('a');
                link.className = 'btn-play-link';
                link.href = item.url || '#';
                link.target = '_blank';
                link.innerHTML = '觀看影片 ↗';
                actions.appendChild(link);

                if (window.isAdminMode) {
                    const delBtn = document.createElement('button');
                    delBtn.className = 'btn btn-danger';
                    delBtn.style.padding = '6px 12px';
                    delBtn.style.fontSize = '12px';
                    delBtn.innerText = '刪除';
                    delBtn.onclick = (e) => { e.preventDefault(); window.deleteVideo(index); };
                    actions.appendChild(delBtn);
                }

                info.appendChild(actions);
                card.appendChild(info);
                wrapper.appendChild(card);
            });
        }

        // 【修正核心】修正新增分頁連動與即時渲染邏輯
        window.addTab = function() {
            const input = document.getElementById('newTabName');
            const name = input ? input.value.trim() : '';
            if (!name) return alert('請填寫分頁名稱');
            
            // 確保物件結構完整
            if (!window.db) window.db = {};
            if (window.db[name]) return alert('此名稱已存在');
            
            window.db[name] = []; // 建立空陣列群組
            window.currentTab = name; // 切換過去
            input.value = ''; // 清空輸入框
            
            // 立即執行本機渲染，讓 UI 馬上變更，再同步雲端
            window.renderTabs();
            window.renderCards();
            window.saveToStorage();
        }

        window.removeCurrentTab = function() {
            if (!window.currentTab) return;
            if (confirm(`確定要永久刪除「${window.currentTab}」分頁嗎？`)) {
                delete window.db[window.currentTab];
                const remaining = Object.keys(window.db || {});
                window.currentTab = remaining.length > 0 ? remaining[0] : "";
                window.renderTabs();
                window.renderCards();
                window.saveToStorage();
            }
        }

        window.importVideos = function() {
            if (!window.currentTab) return alert('請先建立或選擇分頁群組！');
            const textarea = document.getElementById('rawInput');
            if (!textarea) return;
            const content = textarea.value.trim();
            if (!content) return alert('內容不能為空');

            const lines = content.split('\n');
            let count = 0;

            lines.forEach(line => {
                const parts = line.split(/\t| {2,}/); 
                if (parts.length >= 2) {
                    const title = parts[0].trim();
                    const url = parts[parts.length - 1].trim(); 
                    if (url.startsWith('http')) {
                        if(!window.db[window.currentTab]) window.db[window.currentTab] = [];
                        window.db[window.currentTab].push({ title, url });
                        count++;
                    }
                }
            });

            if (count > 0) {
                window.renderCards();
                window.saveToStorage();
                textarea.value = '';
                alert(`成功匯入 ${count} 部影片！`);
            } else {
                alert('格式無法辨識，請確保標題與網址之間有空格。');
            }
        }

        window.flipOrder = function() {
            if (!window.currentTab || !window.db[window.currentTab] || window.db[window.currentTab].length <= 1) return;
            window.db[window.currentTab].reverse();
            window.renderCards();
            window.saveToStorage();
        }

        window.checkPassword = function() {
            const password = prompt("請輸入管理員權限密碼：");
            if (password === "3005") {
                window.isAdminMode = true;
                document.getElementById('adminArea').classList.remove('hidden');
                document.getElementById('adminLoginBtn').innerText = "🔒 鎖定後台";
                window.renderCards();
            } else if (password !== null) {
                alert("密碼不正確！");
            }
        }

        window.lockAdmin = function() {
            window.isAdminMode = false;
            document.getElementById('adminArea').classList.add('hidden');
            document.getElementById('adminLoginBtn').innerText = "🔑 管理員登入";
            window.renderCards();
        }

        window.deleteVideo = function(index) {
            if (confirm("確定要移除這部影片嗎？")) {
                window.db[window.currentTab].splice(index, 1);
                window.renderCards();
                window.saveToStorage();
            }
        }
    </script>
</body>
</html>
