<!-- 引入 Firebase SDK (使用 9+ 模組化版本) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    // 1. Firebase 設定
    const firebaseConfig = {
        apiKey: "AIzaSyBl7yqNoQQBZOt2v6aN_wre1if7cXGFOns",
        authDomain: "fir-836a9.firebaseapp.com",
        databaseURL: "https://fir-836a9-default-rtdb.firebaseio.com/",
        projectId: "fir-836a9",
        storageBucket: "fir-836a9.firebasestorage.app",
        messagingSenderId: "229605718156",
        appId: "1:229605718156:web:533d91c7a0907212a7a3a9"
    };

    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const dbRef = ref(database, 'video_data');

    // 預設數據
    const defaultData = {
        "TankShow": [
            { title: "TankShow 10 360", url: "https://youtu.be/A5ruMMW0_vY" },
            { title: "TankShow 10", url: "https://youtu.be/haUWQOHag5s" }
        ],
        "Zoo": [
            { title: "可愛熊貓日常", url: "https://youtu.be/範例網址1" }
        ]
    };

    // 全域變數初始化
    window.db = {}; 
    window.currentTab = "";
    window.isAdminMode = false;
    let dragSrcIndex = null;

    // 2. 監聽 Firebase 資料庫狀態
    onValue(dbRef, (snapshot) => {
        try {
            const data = snapshot.val();
            if (data && Object.keys(data).length > 0) {
                window.db = data;
            } else {
                // 如果雲端係空的，寫入預設數據
                window.db = defaultData;
                window.saveToStorage();
            }
            
            // 自動鎖定當前 Tab 位置
            const tabs = Object.keys(window.db);
            if (!window.currentTab || !window.db[window.currentTab]) {
                window.currentTab = tabs.length > 0 ? tabs[0] : "";
            }
            
            // 確保資料載入完成才執行渲染
            window.renderTabs();
            window.renderTable();
        } catch (error) {
            console.error("讀取 Firebase 資料時出錯: ", error);
        }
    }, (error) => {
        console.error("Firebase 連線失敗，請檢查 Rules 權限設定：", error);
    });

    // 3. 儲存邏輯
    window.saveToStorage = function() {
        set(dbRef, window.db)
            .then(() => console.log("Firebase 同步成功！"))
            .catch((error) => console.error("同步失敗：", error));
    }

    // --- UI 渲染與操作邏輯 ---

    window.renderTabs = function() {
        const container = document.getElementById('tabsContainer');
        if (!container) return;
        container.innerHTML = '';
        
        if (!window.db) return;
        
        Object.keys(window.db).forEach(tabName => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${tabName === window.currentTab ? 'active' : ''}`;
            btn.innerText = tabName;
            btn.onclick = function() {
                window.currentTab = tabName;
                window.renderTabs();
                window.renderTable();
            };
            container.appendChild(btn);
        });
    }

    window.renderTable = function() {
        const tbody = document.getElementById('tableBody');
        if (!tbody) return;
        tbody.innerHTML = '';

        if (!window.db || !window.currentTab || !window.db[window.currentTab] || window.db[window.currentTab].length === 0) {
            tbody.innerHTML = `<tr><td colspan="${window.isAdminMode ? 3 : 2}" style="text-align:center; color:#999;">此分頁暫無影片</td></tr>`;
            return;
        }

        window.db[window.currentTab].forEach((item, index) => {
            const tr = document.createElement('tr');
            
            if (window.isAdminMode) {
                tr.draggable = true;
                tr.className = "draggable";
                tr.addEventListener('dragstart', (e) => handleDragStart(e, index));
                tr.addEventListener('dragover', handleDragOver);
                tr.addEventListener('dragenter', (e) => tr.classList.add('drag-over'));
                tr.addEventListener('dragleave', (e) => tr.classList.remove('drag-over'));
                tr.addEventListener('drop', (e) => handleDrop(e, index));
                tr.addEventListener('dragend', () => {
                    document.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
                });
            }
            
            const tdTitle = document.createElement('td');
            const handle = window.isAdminMode ? `<span class="drag-handle">☰</span>` : '';
            tdTitle.innerHTML = `${handle}<strong>${item.title || '無標題'}</strong>`;
            tr.appendChild(tdTitle);

            const tdView = document.createElement('td');
            tdView.innerHTML = `<a class="btn-view" href="${item.url || '#'}" target="_blank">▶ 開啟影片</a>`;
            tr.appendChild(tdView);

            const tdCtrl = document.createElement('td');
            tdCtrl.className = `admin-ctrl ${window.isAdminMode ? '' : 'hidden'}`;
            tdCtrl.innerHTML = `<button onclick="deleteVideo(${index})" class="btn-danger" style="padding: 5px 10px; font-size: 12px; margin:0;">刪除</button>`;
            tr.appendChild(tdCtrl);

            tbody.appendChild(tr);
        });
    }

    function handleDragStart(e, index) {
        dragSrcIndex = index;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', index);
    }

    function handleDragOver(e) {
        if (e.preventDefault) e.preventDefault(); 
        e.dataTransfer.dropEffect = 'move';
        return false;
    }

    function handleDrop(e, targetIndex) {
        if (e.stopPropagation) e.stopPropagation(); 
        if (dragSrcIndex !== null && dragSrcIndex !== targetIndex) {
            const targetArray = window.db[window.currentTab];
            const movedItem = targetArray.splice(dragSrcIndex, 1)[0];
            targetArray.splice(targetIndex, 0, movedItem);
            
            window.saveToStorage();
        }
        dragSrcIndex = null;
    }

    window.flipOrder = function() {
        if (!window.currentTab || !window.db[window.currentTab] || window.db[window.currentTab].length <= 1) return;
        window.db[window.currentTab].reverse();
        window.saveToStorage();
        alert(`已成功翻轉「${window.currentTab}」內所有影片的排列順序！`);
    }

    window.checkPassword = function() {
        if (window.isAdminMode) return alert("你已經處於管理員模式。");
        const password = prompt("請輸入管理員密碼：");
        if (password === "3005") {
            window.isAdminMode = true;
            const adminArea = document.getElementById('adminArea');
            if (adminArea) adminArea.classList.remove('hidden');
            document.querySelectorAll('.admin-ctrl').forEach(el => el.classList.remove('hidden'));
            window.renderTable();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else if (password !== null) {
            alert("密碼錯誤！");
        }
    }

    window.lockAdmin = function() {
        window.isAdminMode = false;
        const adminArea = document.getElementById('adminArea');
        if (adminArea) adminArea.classList.add('hidden');
        document.querySelectorAll('.admin-ctrl').forEach(el => el.classList.add('hidden'));
        window.renderTable();
    }

    window.addTab = function() {
        const nameInput = document.getElementById('newTabName');
        if (!nameInput) return;
        const name = nameInput.value.trim();
        if (!name) return alert('請輸入分頁名稱！');
        if (window.db[name]) return alert('此分頁名稱已存在！');
        window.db[name] = [];
        window.currentTab = name;
        nameInput.value = '';
        window.saveToStorage();
    }

    window.removeCurrentTab = function() {
        if (!window.currentTab) return;
        if (confirm(`確定要刪除整個「${window.currentTab}」分頁嗎？`)) {
            delete window.db[window.currentTab];
            const remainingTabs = Object.keys(window.db);
            window.currentTab = remainingTabs.length > 0 ? remainingTabs[0] : "";
            window.saveToStorage();
        }
    }

    window.importVideos = function() {
        if (!window.currentTab) return alert('請先選擇或創建一個分頁！');
        const inputEl = document.getElementById('rawInput');
        if (!inputEl) return;
        const input = inputEl.value.trim();
        if (!input) return alert('請先貼上影片資料！');

        const lines = input.split('\n');
        let count = 0;

        lines.forEach(line => {
            const parts = line.split(/\t| {2,}/); 
            if (parts.length >= 2) {
                const title = parts[0].trim();
                const url = parts[parts.length - 1].trim(); 
                if (url.startsWith('http')) {
                    window.db[window.currentTab].push({ title, url });
                    count++;
                }
            }
        });

        if (count > 0) {
            window.saveToStorage();
            inputEl.value = '';
            alert(`成功追加了 ${count} 條影片！`);
        } else {
            alert('未能解析資料，請檢查格式。');
        }
    }

    // 👈 呢度修正咗原本會搞到白畫面的 bug
    window.deleteVideo = function(index) {
        if (!window.db || !window.db[window.currentTab] || !window.db[window.currentTab][index]) return;
        const videoTitle = window.db[window.currentTab][index].title || "未命名影片";
        if (confirm(`確定要刪除影片「${videoTitle}」嗎？`)) {
            window.db[window.currentTab].splice(index, 1);
            window.saveToStorage();
        }
    }
</script>
