<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>精選影片庫</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        
        body { background-color: var(--bg); color: var(--text-main); min-height: 100vh; display: flex; overflow-x: hidden; }
        
        .hidden { display: none !important; }

        /* 左側邊欄佈局 */
        aside {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s ease;
            flex-shrink: 0;
            height: 100vh;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        aside.folded {
            width: 0;
            overflow: hidden;
            border-right-color: transparent;
        }

        .sidebar-header {
            padding: 20px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            height: 70px;
        }
        .sidebar-header h2 { font-size: 16px; font-weight: 700; color: var(--text-main); }

        /* 分頁直排容器 */
        #tabsContainer {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            flex-grow: 1;
            -webkit-overflow-scrolling: touch;
        }
        
        /* 直排分頁按鈕 */
        .tab-btn {
            width: 100%;
            padding: 12px 14px;
            border-radius: var(--radius);
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 14px;
            display: flex;
            align-items: center;
            line-height: normal; 
            height: 44px; /* iOS 最佳點擊熱區高度 */
            box-sizing: border-box;
        }
        .tab-btn:hover { color: var(--text-main); background: #f1f5f9; }
        .tab-btn.active { background: #eef2ff; color: var(--primary); border-left: 4px solid var(--primary); border-radius: 4px var(--radius) var(--radius) 4px; }
        
        .tab-btn.draggable { cursor: grab; }
        .tab-btn.draggable:active { cursor: grabbing; }
        .tab-btn.drag-over { border: 2px dashed var(--primary); background: #f5f3ff; }

        /* 右側主內容區 */
        main {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            width: 100%;
            min-width: 0; /* 防止 Flex 子元素溢出 */
        }

        /* 👑 頂部導航欄核心優化 */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
            flex-shrink: 0;
            min-height: 50px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
            min-width: 0; /* 讓內部文字超出時可以變省略號 */
        }

        header h1 { 
            font-size: 18px; 
            font-weight: 700; 
            color: var(--text-main); 
            letter-spacing: -0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 按鈕基本樣式 */
        .btn { 
            padding: 0 14px; 
            height: 38px;
            border-radius: var(--radius); 
            border: 1px solid var(--border); 
            background: var(--card-bg); 
            color: var(--text-main); 
            font-weight: 500; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            font-size: 13px; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            gap: 6px; 
            white-space: nowrap;
            -webkit-appearance: none; /* 移除 iOS 預設按鈕渲染 */
            flex-shrink: 0;
        }
        .btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { background: #fee2e2; color: var(--danger); border: none; }
        .btn-danger:hover { background: #fca5a5; color: var(--danger-hover); }
        .btn-toggle { padding: 0 10px; font-size: 14px; }

        /* 管理員後台面板 */
        #adminArea { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border: 1px solid var(--border); padding: 20px; border-radius: var(--radius); margin-bottom: 24px; box-shadow: var(--shadow-lg); }
        #adminArea h3 { margin-bottom: 14px; font-size: 16px; }
        .admin-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
        .admin-input-group { display: flex; gap: 8px; margin-bottom: 14px; }
        
        /* 針對 iOS 修正輸入框：字體必須 16px 或以上，否則點擊時畫面會自動放大放大 */
        input[type="text"], textarea { 
            width: 100%; 
            padding: 10px 12px; 
            border-radius: var(--radius); 
            border: 1px solid var(--border); 
            background: var(--card-bg); 
            font-size: 16px; 
            outline: none; 
            transition: border 0.2s; 
            -webkit-appearance: none; 
        }
        input[type="text"]:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        /* 影片卡片網格 */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .video-card { background: var(--card-bg); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); transition: transform 0.2s ease, box-shadow 0.2s ease; position: relative; display: flex; flex-direction: column; }
        
        .thumb-link { display: block; width: 100%; aspect-ratio: 16 / 9; text-decoration: none; position: relative; overflow: hidden; }
        .thumb-wrapper { width: 100%; height: 100%; background: #e2e8f0; position: relative; }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; }
        
        .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
        .video-card:hover .play-overlay { opacity: 1; }
        .play-icon { width: 44px; height: 44px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 16px; }

        .video-info { padding: 14px; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; gap: 10px; }
        .video-title { font-size: 14px; font-weight: 600; color: var(--text-main); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 38px; }
        
        .card-actions { display: flex; justify-content: flex-end; align-items: center; margin-top: auto; }

        .video-card.draggable { cursor: grab; }
        .video-card.drag-over { border: 2px dashed var(--primary); }
        .drag-badge { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.6); color: white; padding: 3px 6px; border-radius: 4px; font-size: 10px; z-index: 10; pointer-events: none; }

        .status-msg { text-align: center; padding: 50px 20px; color: var(--text-muted); font-size: 14px; grid-column: 1 / -1; }

        /* 📱 超強 iOS / 流動端響應式 UI 優化 */
        @media (max-width: 768px) {
            body { position: relative; }
            
            /* 將側邊欄改為滑出式抽屜（Drawer）避免擠壓頂部 */
            aside {
                position: fixed;
                left: 0;
                top: 0;
                height: 100vh;
                transform: translateX(0);
                box-shadow: 4px 0 24px rgba(0,0,0,0.15);
                width: var(--sidebar-width);
            }
            
            aside.folded {
                transform: translateX(-100%);
                width: var(--sidebar-width); /* 保持寬度以便動畫流暢 */
                border-right-color: transparent;
            }
            
            main {
                padding: 16px;
                padding-top: 12px;
                width: 100%;
            }

            header h1 {
                font-size: 15px; /* 縮小字體防止 iPhone 塞唔落 */
            }
            
            .video-grid { grid-template-columns: 1fr; gap: 14px; }
        }
    </style>
</head>
<body>

    <!-- 左側邊欄 -->
    <aside id="sidebar">
        <div class="sidebar-header">
            <h2>📁 影片分頁群組</h2>
            <button onclick="toggleSidebar()" class="btn btn-toggle" title="收摺側邊欄">◀</button>
        </div>
        <div id="tabsContainer">
            <div style="color: var(--text-muted); font-size:13px; padding: 0 8px;">正在建立安全連線...</div>
        </div>
    </aside>

    <!-- 右側主內容區 -->
    <main>
        <header>
            <div class="header-left">
                <button id="toggleExpandBtn" onclick="toggleSidebar()" class="btn btn-toggle hidden" title="展開側邊欄">▶ 選單</button>
                <h1 id="mainTitle">精選影片庫</h1>
            </div>
            <div>
                <button id="adminLoginBtn" onclick="checkPassword()" class="btn">🔑 登入</button>
            </div>
        </header>

        <!-- 管理員控制區 -->
        <div id="adminArea" class="hidden">
            <h3>🛠️ 管理員控制台</h3>
            <div class="admin-actions">
                <button onclick="lockAdmin()" class="btn">🔒 鎖定</button>
                <button onclick="flipOrder()" class="btn">↕️ 顛倒順序</button>
                <button onclick="removeCurrentTab()" class="btn btn-danger">🗑️ 刪除分頁</button>
            </div>
            
            <div class="admin-input-group">
                <input type="text" id="newTabName" placeholder="新分頁名稱...">
                <button onclick="addTab()" class="btn btn-primary">📁 新增</button>
            </div>
            
            <div style="margin-bottom: 12px;">
                <textarea id="rawInput" rows="4" placeholder="💡 智能匯入支援「自動建群」格式：&#10;[新分頁名稱]&#10;影片標題1 https://youtu.be/xxx"></textarea>
            </div>
            <button onclick="importVideos()" class="btn btn-primary" style="width: 100%;">⚡ 智能解析並匯入影片</button>
        </div>

        <!-- 影片卡片容器 -->
        <div class="video-grid" id="videoWrapper">
            <div class="status-msg">正在同步 Firebase 資料庫...</div>
        </div>
    </main>

    <script>
        // Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyBl7yqNoQQBZOt2v6aN_wre1if7cXGFOns",
            authDomain: "fir-836a9.firebaseapp.com",
            databaseURL: "https://fir-836a9-default-rtdb.firebaseio.com/",
            projectId: "fir-836a9",
            storageBucket: "fir-836a9.firebasestorage.app",
            messagingSenderId: "229605718156",
            appId: "1:229605718156:web:533d91c7a0907212a7a3a9"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database(); 
        const dbRef = database.ref('video_data');

        const defaultData = {
            "TankShow": [
                { title: "TankShow 10 360 現場精采片段", url: "https://youtu.be/A5ruMMW0_vY" },
                { title: "TankShow 10 完整紀錄檔", url: "https://youtu.be/haUWQOHag5s" }
            ],
            "動物精選": [
                { title: "可愛大熊貓的搞笑日常派對", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" }
            ]
        };

        window.db = {}; 
        window.currentTab = "";
        window.isAdminMode = false;
        let dragSrcIndex = null;
        let tabDragSrcIndex = null;

        // 初始化判斷手機端預設收摺
        if (window.innerWidth <= 768) {
            document.addEventListener("DOMContentLoaded", () => {
                document.getElementById('sidebar').classList.add('folded');
                document.getElementById('toggleExpandBtn').classList.remove('hidden');
            });
        }

        window.toggleSidebar = function() {
            const sidebar = document.getElementById('sidebar');
            const toggleExpandBtn = document.getElementById('toggleExpandBtn');
            if (sidebar.classList.contains('folded')) {
                sidebar.classList.remove('folded');
                toggleExpandBtn.classList.add('hidden');
            } else {
                sidebar.classList.add('folded');
                toggleExpandBtn.classList.remove('hidden');
            }
        }

        function getYoutubeThumb(url) {
            if (!url) return 'https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=500&q=80';
            let videoId = null;
            try {
                if (url.includes('youtu.be/')) {
                    videoId = url.split('youtu.be/')[1].split(/[?#]/)[0];
                } else if (url.includes('v=')) {
                    videoId = url.split('v=')[1].split('&')[0].split(/[?#]/)[0];
                } else if (url.includes('embed/')) {
                    videoId = url.split('embed/')[1].split(/[?#]/)[0];
                }
            } catch(e) { console.error(e); }
            return videoId ? `https://img.youtube.com/vi/${videoId}/mqdefault.jpg` : 'https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=500&q=80';
        }

        dbRef.on('value', (snapshot) => {
            try {
                const data = snapshot.val();
                if (data && Object.keys(data).length > 0) {
                    window.db = data;
                } else {
                    window.db = defaultData;
                    window.saveToStorage();
                }
                
                const tabs = Object.keys(window.db);
                if (!window.currentTab || !window.db[window.currentTab]) {
                    window.currentTab = tabs.length > 0 ? tabs[0] : "";
                }
                
                window.renderTabs();
                window.renderCards();
            } catch (error) { console.error(error); }
        });

        window.saveToStorage = function() {
            dbRef.set(window.db)
                .then(() => console.log("雲端同步成功"))
                .catch((err) => console.error("同步失敗", err));
        }

        window.renderTabs = function() {
            const container = document.getElementById('tabsContainer');
            if (!container) return;
            container.innerHTML = '';
            
            const tabs = Object.keys(window.db || {});
            if(tabs.length === 0) {
                container.innerHTML = '<div style="color:var(--text-muted); font-size:13px; padding:10px 8px;">💡 沒有分頁</div>';
                return;
            }

            const mainTitle = document.getElementById('mainTitle');
            if(mainTitle && window.currentTab) {
                mainTitle.innerText = `${window.currentTab}`;
            }

            tabs.forEach((tabName, index) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${tabName === window.currentTab ? 'active' : ''}`;
                btn.innerText = `📁 ${tabName}`;
                
                if (window.isAdminMode) {
                    btn.draggable = true;
                    btn.classList.add('draggable');
                    
                    btn.ondblclick = function(e) {
                        e.stopPropagation();
                        const newName = prompt(`請輸入「${tabName}」的新名稱：`, tabName);
                        if (newName && newName.trim() !== "" && newName.trim() !== tabName) {
                            const trimmedName = newName.trim();
                            if (window.db[trimmedName]) return alert("名稱已存在！");
                            
                            const newDb = {};
                            Object.keys(window.db).forEach(key => {
                                if (key === tabName) { newDb[trimmedName] = window.db[tabName]; } 
                                else { newDb[key] = window.db[key]; }
                            });
                            
                            window.db = newDb;
                            if (window.currentTab === tabName) window.currentTab = trimmedName;
                            window.renderTabs();
                            window.saveToStorage();
                        }
                    };

                    btn.addEventListener('dragstart', (e) => tabDragSrcIndex = index);
                    btn.addEventListener('dragover', (e) => e.preventDefault());
                    btn.addEventListener('dragenter', () => btn.classList.add('drag-over'));
                    btn.addEventListener('dragleave', () => btn.classList.remove('drag-over'));
                    btn.addEventListener('drop', (e) => {
                        e.stopPropagation();
                        if (tabDragSrcIndex !== null && tabDragSrcIndex !== index) {
                            const tempTabs = Object.keys(window.db);
                            const movedTabKey = tempTabs.splice(tabDragSrcIndex, 1)[0];
                            tempTabs.splice(index, 0, movedTabKey);
                            
                            const newDb = {};
                            tempTabs.forEach(key => { newDb[key] = window.db[key]; });
                            window.db = newDb;
                            window.renderTabs();
                            window.saveToStorage();
                        }
                        tabDragSrcIndex = null;
                    });
                    btn.addEventListener('dragend', () => {
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('drag-over'));
                    });
                }

                btn.onclick = function() {
                    window.currentTab = tabName;
                    window.renderTabs();
                    window.renderCards();
                    if (window.innerWidth <= 768) {
                        window.toggleSidebar();
                    }
                };
                container.appendChild(btn);
            });
        }

        window.renderCards = function() {
            const wrapper = document.getElementById('videoWrapper');
            if (!wrapper) return;
            wrapper.innerHTML = '';

            if (!window.db || !window.currentTab || !window.db[window.currentTab] || window.db[window.currentTab].length === 0) {
                wrapper.innerHTML = `<div class="status-msg">📭 此分頁目前空空如也</div>`;
                return;
            }

            window.db[window.currentTab].forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                
                if (window.isAdminMode) {
                    card.draggable = true;
                    card.classList.add('draggable');
                    card.innerHTML = `<div class="drag-badge">☰ 拖曳</div>`;
                    
                    card.addEventListener('dragstart', (e) => dragSrcIndex = index);
                    card.addEventListener('dragover', (e) => e.preventDefault());
                    card.addEventListener('dragenter', () => card.classList.add('drag-over'));
                    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
                    card.addEventListener('drop', (e) => {
                        e.stopPropagation();
                        if (dragSrcIndex !== null && dragSrcIndex !== index) {
                            const list = window.db[window.currentTab];
                            const targetItem = list.splice(dragSrcIndex, 1)[0];
                            list.splice(index, 0, targetItem);
                            window.saveToStorage();
                        }
                        dragSrcIndex = null;
                    });
                    card.addEventListener('dragend', () => {
                        document.querySelectorAll('.video-card').forEach(c => c.classList.remove('drag-over'));
                    });
                }

                const thumbLink = document.createElement('a');
                thumbLink.className = 'thumb-link';
                thumbLink.href = item.url || '#';
                thumbLink.target = '_blank';

                const thumbWrapper = document.createElement('div');
                thumbWrapper.className = 'thumb-wrapper';
                const img = document.createElement('img');
                img.className = 'thumb-img';
                img.src = getYoutubeThumb(item.url);
                img.loading = 'lazy';
                
                const overlay = document.createElement('div');
                overlay.className = 'play-overlay';
                overlay.innerHTML = `<div class="play-icon">▶</div>`;
                
                thumbWrapper.appendChild(img);
                thumbWrapper.appendChild(overlay);
                thumbLink.appendChild(thumbWrapper);
                card.appendChild(thumbLink);

                const info = document.createElement('div');
                info.className = 'video-info';
                const title = document.createElement('div');
                title.className = 'video-title';
                title.innerText = item.title || '未命名影片';
                info.appendChild(title);

                const actions = document.createElement('div');
                actions.className = 'card-actions';

                if (window.isAdminMode) {
                    const delBtn = document.createElement('button');
                    delBtn.className = 'btn btn-danger';
                    delBtn.style.padding = '0 10px';
                    delBtn.style.height = '30px';
                    delBtn.style.fontSize = '12px';
                    delBtn.innerText = '刪除';
                    delBtn.onclick = (e) => { e.preventDefault(); e.stopPropagation(); window.deleteVideo(index); };
                    actions.appendChild(delBtn);
                    info.appendChild(actions);
                }
                
                card.appendChild(info);
                wrapper.appendChild(card);
            });
        }

        window.addTab = function() {
            const input = document.getElementById('newTabName');
            const name = input ? input.value.trim() : '';
            if (!name) return alert('請填寫分頁名稱');
            if (window.db[name]) return alert('此名稱已存在');
            
            window.db[name] = [];
            window.currentTab = name;
            input.value = '';
            window.renderTabs();
            window.renderCards();
            window.saveToStorage();
        }

        window.removeCurrentTab = function() {
            if (!window.currentTab) return;
            if (confirm(`確定要永久刪除「${window.currentTab}」分頁嗎？`)) {
                delete window.db[window.currentTab];
                const remaining = Object.keys(window.db || {});
                window.currentTab = remaining.length > 0 ? remaining[0] : "";
                window.renderTabs();
                window.renderCards();
                window.saveToStorage();
            }
        }

        window.importVideos = function() {
            const textarea = document.getElementById('rawInput');
            if (!textarea) return;
            const content = textarea.value.trim();
            if (!content) return alert('內容不能為空');

            const lines = content.split('\n');
            let count = 0;
            let activeImportTab = window.currentTab;

            lines.forEach(line => {
                line = line.trim();
                if (!line) return;

                if (line.startsWith('[') && line.endsWith(']')) {
                    const targetTabName = line.substring(1, line.length - 1).trim();
                    if (targetTabName) {
                        if (!window.db[targetTabName]) window.db[targetTabName] = [];
                        activeImportTab = targetTabName;
                        if (!window.currentTab) window.currentTab = targetTabName; 
                    }
                    return;
                }

                if (!activeImportTab) {
                    activeImportTab = "未分類影片";
                    if (!window.db[activeImportTab]) window.db[activeImportTab] = [];
                    window.currentTab = activeImportTab;
                }

                const lastSpaceIndex = line.lastIndexOf(' ');
                const lastTabIndex = line.lastIndexOf('\t');
                const splitIndex = Math.max(lastSpaceIndex, lastTabIndex);

                if (splitIndex !== -1) {
                    const title = line.substring(0, splitIndex).trim();
                    const url = line.substring(splitIndex + 1).trim();

                    if (url.startsWith('http') && title) {
                        window.db[activeImportTab].push({ title, url });
                        count++;
                    }
                }
            });

            if (count > 0) {
                window.renderTabs();
                window.renderCards();
                window.saveToStorage();
                textarea.value = '';
                alert(`成功智能解析並匯入 ${count} 部影片！`);
            } else {
                alert('格式無法辨識！');
            }
        }

        window.flipOrder = function() {
            if (!window.currentTab || !window.db[window.currentTab] || window.db[window.currentTab].length <= 1) return;
            window.db[window.currentTab].reverse();
            window.renderCards();
            window.saveToStorage();
        }

        window.checkPassword = function() {
            const password = prompt("請輸入管理員權限密碼：");
            if (password === "3005") {
                window.isAdminMode = true;
                document.getElementById('adminArea').classList.remove('hidden');
                document.getElementById('adminLoginBtn').innerText = "🔒 鎖定";
                window.renderTabs(); 
                window.renderCards();
            } else if (password !== null) {
                alert("密碼不正確！");
            }
        }

        window.lockAdmin = function() {
            window.isAdminMode = false;
            document.getElementById('adminArea').classList.add('hidden');
            document.getElementById('adminLoginBtn').innerText = "🔑 登入";
            window.renderTabs(); 
            window.renderCards();
        }

        window.deleteVideo = function(index) {
            if (confirm("確定要移除這部影片嗎？")) {
                window.db[window.currentTab].splice(index, 1);
                window.renderCards();
                window.saveToStorage();
            }
        }
    </script>
</body>
</html>
